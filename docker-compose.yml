services:
  custom-ollama:
    build:
      context: ./chat-backend
      dockerfile: Dockerfile.ollama
    container_name: custom-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build:
      context: ./chat-backend
      dockerfile: Dockerfile
    container_name: chat_backend
    ports:
      - "8007:8007"
    depends_on:
      - custom-ollama
    environment:
      - OLLAMA_BASE_URL=http://custom-ollama:11434
      - PYTHONPATH=/app/src
    command: uv run uvicorn chat_ai.app:app --host 0.0.0.0 --port 8007

  frontend:
    build:
      context: ./chat-ui
    container_name: chat_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ollama_storage: